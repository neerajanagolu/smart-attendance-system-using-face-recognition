kind = "web"
previewPath = "/"
title = "Smart Attendance"
version = "1.0.0"
id = "artifacts/smart-attendance"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23247

[services.development]
run = "pnpm --filter @workspace/smart-attendance run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/smart-attendance", "run", "build" ]
publicDir = "artifacts/smart-attendance/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23247"
BASE_PATH = "/"
